<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title>Bookbind Studio</title>
  <meta name="viewport" content="width=1440" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=DM+Sans:opsz,wght@9..40,300..700&family=Playpen+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=Sarabun:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" />
  <style>
    html, body { margin: 0; padding: 0; background: #EFE7D8;
                 font-family: 'DM Sans', 'IBM Plex Sans Thai', system-ui, sans-serif;
                 color: #2d2a26; }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    /* Center the 1440-wide page within the viewport */
    #root { display: flex; flex-direction: column; align-items: center; }
    #root > section { width: 1440px; scroll-margin-top: 88px; }
    #root > nav { scroll-margin-top: 0; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="image-slot.js"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="closing.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      return (
        <>
          <Nav />
          <Hero />
          <Services />
          <WhyUs />
          <Portfolio />
          <Process />
          <Terms />
          <PricingQueue />
          <Blog />
          <Contact />
          <CTA />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
