<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <script>
    /* GitHub Pages project sites: pathname /repo or /repo/index.html must resolve
       child scripts to /repo/... — without a trailing slash, "sections.jsx" wrongly
       resolves to site root. Insert <base> before any relative URLs. */
    (function () {
      var p = location.pathname;
      if (/\.html?$/i.test(p)) p = p.replace(/\/[^/]+$/, "/") || "/";
      else if (p !== "/" && !p.endsWith("/")) p += "/";
      if (!p.startsWith("/")) p = "/" + p;
      var b = document.createElement("base");
      b.href = p;
      document.head.appendChild(b);
    })();
  </script>
  <title>JUNATHETYPE</title>
  <meta name="viewport" content="width=1440" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <style>
    html, body { margin: 0; padding: 0; background: #0d0d0d;
                 font-family: 'Anuphan', system-ui, sans-serif;
                 color: #f0ede8; }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    /* Center the 1440-wide page within the viewport */
    #root { display: flex; flex-direction: column; align-items: center; }
    #root > section { width: 1440px; scroll-margin-top: 88px; }
    #root > nav { scroll-margin-top: 0; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="./image-slot.js"></script>
  <script type="text/babel" src="./sections.jsx"></script>
  <script type="text/babel" src="./closing.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      React.useEffect(function () {
        function onClick(e) {
          if (e.defaultPrevented) return;
          if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
          var a = e.target.closest && e.target.closest('a[href^="#"]');
          if (!a || a.target === '_blank') return;
          var hash = a.getAttribute('href');
          if (!hash || hash.length < 2) return;
          var id = hash.slice(1);
          if (!id) return;
          var el = document.getElementById(id);
          if (!el) return;
          e.preventDefault();
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          try { history.replaceState(null, '', hash); } catch (_) {}
        }
        document.addEventListener('click', onClick);
        return function () { document.removeEventListener('click', onClick); };
      }, []);
      return (
        <>
          <Nav />
          <Hero />
          <Services />
          <Portfolio />
          <Process />
          <Terms />
          <PricingQueue />
          <Blog />
          <Contact />
          <CTA />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
